apiVersion: v1
kind: Service
metadata:
  name: llm-llama-3-8b-svc
  namespace: llm-models
  labels:
    app: llm-serving
    model: llama-3.1-8b-instruct
spec:
  type: ClusterIP
  selector:
    app: llm-serving
    model: llama-3.1-8b-instruct
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP  # Sticky sessions for better performance
