apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama-3-8b
  namespace: llm-models
  labels:
    app: llm-serving
    model: llama-3.1-8b-instruct
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for GPU and RWO PVC
  selector:
    matchLabels:
      app: llm-serving
      model: llama-3.1-8b-instruct
  template:
    metadata:
      labels:
        app: llm-serving
        model: llama-3.1-8b-instruct
    spec:
      # GPU node selection
      nodeSelector:
        nvidia.com/gpu.present: "true"

      # Tolerate GPU taints
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

      containers:
      - name: vllm
        image: vllm/vllm-openai:latest

        # vLLM serve command
        command:
        - vllm
        - serve

        # Model configuration
        args:
        - /mnt/models/meta-llama/Llama-3.1-8B-Instruct  # Model path in PVC
        - --port=8000
        - --served-model-name=meta-llama/Llama-3.1-8B-Instruct
        - --trust-remote-code
        - --tensor-parallel-size=1  # 1 GPU for 8B model
        - --gpu-memory-utilization=0.90  # Use 90% of GPU VRAM
        - --max-model-len=8192  # Context window (adjust based on VRAM)
        - --dtype=auto
        - --disable-log-requests  # Reduce log verbosity in production

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        # Environment variables
        env:
        - name: HF_HOME
          value: /tmp/hf-cache
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: spawn

        # Resource allocation
        resources:
          requests:
            cpu: "8"
            memory: 32Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "16"
            memory: 64Gi
            nvidia.com/gpu: "1"

        # Volume mounts
        volumeMounts:
        - name: model-storage
          mountPath: /mnt/models
          readOnly: true
        - name: shm
          mountPath: /dev/shm

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300  # Model loading takes time
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-storage
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi  # Shared memory for vLLM

      restartPolicy: Always
