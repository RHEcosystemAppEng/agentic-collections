apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-mixtral-8x7b-runtime
  namespace: llm-models
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/template-display-name: "vLLM Runtime - Mixtral 8x7B"
    opendatahub.io/template-name: "vllm-mixtral-8x7b-runtime"
spec:
  supportedModelFormats:
    - name: vLLM
      version: "1"
      autoSelect: true
  multiModel: false
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:latest
      command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
      args:
        - --model
        - /mnt/models/Mixtral/Mixtral-8x7B-Instruct-v0.1
        - --port
        - "8080"
        - --dtype
        - auto
        - --gpu-memory-utilization
        - "0.90"
        - --max-model-len
        - "32768"
        - --max-num-seqs
        - "128"
        - --enable-auto-tool-choice
        - --tool-call-parser
        - hermes
      env:
        - name: HF_HOME
          value: /tmp/hf_home
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: spawn
        - name: HOME
          value: /tmp
        - name: FLASHINFER_WORKSPACE_DIR
          value: /tmp/flashinfer
        - name: XDG_CACHE_HOME
          value: /tmp/cache
      resources:
        limits:
          cpu: "16"
          memory: 128Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "8"
          memory: 64Gi
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
  nodeSelector:
    nvidia.com/gpu.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
