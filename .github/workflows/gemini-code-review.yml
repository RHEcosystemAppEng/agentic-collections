name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -H "Accept: application/vnd.github.v3.diff" \
            "/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            > /tmp/pr.diff

          DIFF_SIZE=$(wc -c < /tmp/pr.diff)
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"

          if [ "$DIFF_SIZE" -gt 200000 ]; then
            head -c 200000 /tmp/pr.diff > /tmp/pr_truncated.diff
            echo "truncated=true" >> "$GITHUB_OUTPUT"
          else
            cp /tmp/pr.diff /tmp/pr_truncated.diff
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if empty diff
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No diff found, skipping review."

      - name: Build review context
        if: steps.diff.outputs.diff_size != '0'
        run: |
          {
            echo "=== PROJECT RULES: CLAUDE.md ==="
            cat CLAUDE.md 2>/dev/null || echo "(not found)"
            echo ""
            echo "=== PROJECT RULES: SKILL_DESIGN_PRINCIPLES.md ==="
            cat SKILL_DESIGN_PRINCIPLES.md 2>/dev/null || echo "(not found)"
          } > /tmp/project_rules.txt

          CHANGED_PACKS=$(grep -oP '^diff --git a/([^/]+)/' /tmp/pr.diff | sort -u | sed 's|diff --git a/||;s|/||')
          for pack in $CHANGED_PACKS; do
            if [ -f "$pack/CLAUDE.md" ]; then
              {
                echo ""
                echo "=== PACK RULES: $pack/CLAUDE.md ==="
                cat "$pack/CLAUDE.md"
              } >> /tmp/project_rules.txt
            fi
          done

          head -c 50000 /tmp/project_rules.txt > /tmp/project_rules_truncated.txt

      - name: Review with Gemini
        if: steps.diff.outputs.diff_size != '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not set"
            exit 1
          fi

          SYSTEM_PROMPT=$(cat .github/gemini-review-prompt.md)

          if [ "${{ steps.diff.outputs.truncated }}" = "true" ]; then
            SYSTEM_PROMPT="${SYSTEM_PROMPT}

          Note: This diff was truncated due to size. Review covers the first ~200KB only."
          fi

          RULES_CONTEXT=$(cat /tmp/project_rules_truncated.txt)
          DIFF_CONTENT=$(cat /tmp/pr_truncated.diff)

          jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg rules "$RULES_CONTEXT" \
            --arg diff "$DIFF_CONTENT" \
            '{
              "contents": [{
                "parts": [{
                  "text": ($system + "\n\n---\n\nPROJECT RULES REFERENCE:\n\n" + $rules + "\n\n---\n\nPULL REQUEST DIFF:\n\n" + $diff)
                }]
              }],
              "generationConfig": {
                "temperature": 0.2,
                "maxOutputTokens": 8192
              }
            }' > /tmp/request.json

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d @/tmp/request.json)

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Gemini API returned HTTP $HTTP_CODE"
            cat /tmp/response.json
            exit 1
          fi

          REVIEW=$(jq -r '.candidates[0].content.parts[0].text // empty' /tmp/response.json)

          if [ -z "$REVIEW" ]; then
            echo "::error::Gemini returned empty review"
            jq . /tmp/response.json
            exit 1
          fi

          echo "$REVIEW" > /tmp/review.md

      - name: Post review comment
        if: steps.diff.outputs.diff_size != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Gemini Code Review"
            echo ""
            cat /tmp/review.md
            echo ""
            echo "---"
            echo "*Automated review by Gemini 3.1 Pro | Rules: CLAUDE.md, SKILL_DESIGN_PRINCIPLES.md*"
          } > /tmp/comment.md

          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/comment.md
